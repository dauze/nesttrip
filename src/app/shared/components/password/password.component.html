<div class="app-password">
  <input
    [type]="masked() ? 'password' : 'text'"
    [id]="inputId()"
    class="app-input-text"
    [placeholder]="placeholder()"
    [autocomplete]="autocomplete()"
    [value]="value"
    [disabled]="disabled"
    (input)="onInput($any($event.target).value)"
    (blur)="onTouched?.()" />
  <button
    type="button"
    class="app-password__toggle"
    [attr.aria-label]="masked() ? 'Afficher le mot de passe' : 'Masquer le mot de passe'"
    (click)="toggleMask()">
    <i class="pi" [class.pi-eye]="masked()" [class.pi-eye-slash]="!masked()"></i>
  </button>
</div>
