<form [formGroup]="form" class="min-w-0 compact-form">
  <div class="m-0 grid-label">
    <div class="grid m-0">
      
      <!-- TYPE -->
      <div class="col-6 p-0 min-w-0 overflow-hidden">
        <div class="flex flex-column gap-1 w-full min-w-0">
          <label for="activity-type" class="text-color-secondary text-sm flex align-items-center gap-1">
            <i class="pi pi-tag text-sm"></i>Type
          </label>
          <p-select inputId="activity-type" [options]="activityTypeOptions" formControlName="type" class="w-full min-w-0 transparent-select" appendTo="body" />
        </div>
      </div>
      
      <!-- RESA -->
      <div class="col-6 p-0 min-w-0 overflow-hidden" formGroupName="booking">
        <div class="flex flex-column gap-1 w-full min-w-0">
          <label for="booking-status" class="text-color-secondary text-sm flex align-items-center gap-1">
            <i class="pi pi-bookmark text-sm"></i>Résa
          </label>
          <p-select inputId="booking-status" [ngClass]="'booking ' + bookingMeta().className" [options]="bookingStatusOptions" formControlName="status" optionLabel="label" optionValue="value" appendTo="body" class="w-full min-w-0 transparent-select" />
        </div>
      </div>
      
      <p-divider class="m-1"/>
  
      <!-- DEBUT -->
      <div class="col-6 p-0 min-w-0 overflow-hidden">
        <div class="flex flex-column gap-1 w-full min-w-0">
          <label for="start-time" class="text-color-secondary text-sm flex align-items-center gap-1">
            <i class="pi pi-calendar text-sm"></i>Début
          </label>
          <app-time-picker-dialog id="start-time" formControlName="startTime" />
        </div>
      </div>
      
      <!-- FIN -->
      <div class="col-6 p-0 min-w-0 overflow-hidden">
        <div class="flex flex-column gap-1 min-w-0">
          <label for="end-time" class="text-color-secondary text-sm flex align-items-center gap-1">
            <i class="pi pi-calendar-times text-sm"></i>Fin
          </label>
          <app-time-picker-dialog id="end-time" formControlName="endTime" />
        </div>
      </div>
      
      <p-divider class="m-1"/>
      
      <!-- DUREE -->
      <div class="col-6 p-0 min-w-0 overflow-hidden">
        <div class="flex flex-column gap-1 min-w-0">
          <label for="duration-time" class="text-color-secondary text-sm flex align-items-center gap-1">
            <i class="pi pi-clock text-sm"></i>Durée
          </label>
          <app-time-picker-dialog id="duration-time" [formControl]="durationTimeControl" />
        </div>
      </div>
      
      <!-- PRIX -->
      <div class="col-6 p-0 min-w-0 overflow-hidden" formGroupName="price">
        <div class="flex flex-column gap-1 w-full min-w-0">
          <label for="price-amount" class="text-color-secondary text-sm flex align-items-center gap-1">
            <i class="pi pi-euro text-sm"></i>Prix
          </label>
          <div class="flex align-items-center gap-1 w-full min-w-0">
            <p-inputNumber
              inputId="price-amount"
              formControlName="amount"
              class="flex-1 min-w-0 transparent-inputtext"
              inputStyleClass="w-full min-w-0 text-sm" />
            <p-select
              [options]="currencyOptions"
              formControlName="currency"
              appendTo="body"
              class="flex-none transparent-select" />
          </div>
        </div>
      </div>
      
      <!-- DEADLINE -->
      @if (showDeadline()) {
        <p-divider class="m-1" />
        <div class="col-12 p-0 min-w-0 overflow-hidden" formGroupName="booking">
          <div class="flex flex-column gap-1 w-full min-w-0">
            <label for="booking-deadline" class="text-xs flex align-items-center gap-1" [ngClass]="isDeadlineSoon() ? 'text-orange-500' : 'text-color-secondary'">
              <i class="pi pi-calendar text-xs"></i>Deadline
            </label>
            <p-datepicker inputId="booking-deadline" [readonlyInput]="true" formControlName="deadline" dateFormat="dd/mm/yy" [showIcon]="false" appendTo="body" [touchUI]="viewport.isMobile()" placeholder="Aucune deadline" class="w-max transparent-inputtext" />
          </div>
        </div>
      }
    </div>
  </div>

  <p-divider class="m-1" />
  
  <!-- NOTES -->
  <div class="flex flex-column gap-2 mb-2">
    <label for="form-notes" class="text-color-secondary text-sm flex align-items-center gap-1">
      <i class="pi pi-pencil text-xs"></i>Notes
    </label>
    <textarea id="form-notes" pTextarea formControlName="notes" placeholder="Ajouter une note…" rows="2" autoResize="true" class="w-full"></textarea>
  </div>
</form>
