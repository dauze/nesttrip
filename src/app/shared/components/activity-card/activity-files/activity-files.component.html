<div class="flex flex-column gap-2">
  <span class="text-color-secondary text-sm flex align-items-center gap-1">
    <i class="pi pi-paperclip text-xs"></i>Fichiers
  </span>

  @if (uploadingFiles().size > 0) {
    <div class="flex align-items-center gap-2 text-color-secondary text-sm">
      <app-progress-spinner [strokeWidth]="3" [style]="{ width: '1.25rem', height: '1.25rem' }" />
      <span>{{ uploadingFiles().size }} fichier(s) en cours d'envoi…</span>
    </div>
  }

  <div class="flex flex-wrap gap-2 align-items-center">
    @for (file of activity().files; track file.path; let i = $index) {
      <app-chip
        [icon]="fileIcon(file.name)"
        [removable]="true"
        (click)="openFile(file)"
        (remove)="removeFile(i)"
        class="surface-100 text-sm cursor-pointer">
        <span class="file-name" [title]="file.name">{{ file.name }}</span>
      </app-chip>
    }
    <p-fileUpload
      mode="basic"
      chooseLabel="Ajouter"
      chooseIcon="pi pi-upload"
      [multiple]="true"
      [auto]="true"
      (onSelect)="onFileSelect($event)"
      [chooseButtonProps]="{ severity: 'secondary', rounded: true }"
      styleClass="p-0" />
  </div>
</div>
