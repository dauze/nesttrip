<div
    class="custom-time-input-trigger flex justify-content-start align-items-center"
    role="button"
    tabindex="0"
    (click)="openDialog()"
>
    {{ displayText }}
</div>

<p-dialog
    [(visible)]="visible"
    [modal]="true"
    [draggable]="false"
    [resizable]="false"
    [dismissableMask]="true"
    appendTo="body"
    header="Sélectionner une heure"
    styleClass="clock-dialog glass-modal speed-dialog"
    [style]="{ width: '21rem' }"
>
    <div class="flex flex-column gap-2">

        <div
            class="flex justify-content-center align-items-center gap-2"
        >
            <button
                type="button"
                class="time-box"
                [class.active]="selectionMode === 'hour'"
                (click)="selectionMode = 'hour'"
            >
                {{ tempHour }}
            </button>

            <span class="time-separator">
                :
            </span>

            <button
                type="button"
                class="time-box"
                [class.active]="selectionMode === 'minute'"
                (click)="selectionMode = 'minute'"
            >
                {{ tempMinute }}
            </button>
        </div>

        <div
            #clockFace
            class="clock-face"
            (pointerdown)="startDrag($event)"
            (pointermove)="onDrag($event)"
            (pointerup)="stopDrag()"
            (pointercancel)="stopDrag()"
            (pointerleave)="stopDrag()"
        >

            @for (
                item of currentValues;
                track item.value
            ) {

                <button
                    type="button"
                    class="clock-number"
                    [class.selected]="selectedValue === item.label"
                    [class.inner]="item.inner"
                    [style.left]="item.x"
                    [style.top]="item.y"
                    (click)="selectValue(item.label)"
                >
                    {{ item.label }}
                </button>

            }

            <div
                class="clock-hand"
                [ngStyle]="handStyle"
            ></div>

            <div
                class="clock-selector"
                [style.left]="selectorPosition.left"
                [style.top]="selectorPosition.top"
            ></div>

            <div class="clock-center"></div>

        </div>

    </div>

    <ng-template pTemplate="footer">
        <div
            class="flex justify-content-end gap-2"
        >
            <app-button
                label="Annuler"
                [text]="true"
                (click)="close()"
            />

            <app-button
                label="OK"
                [text]="true"
                (click)="validate()"
            />
        </div>
    </ng-template>
</p-dialog>
