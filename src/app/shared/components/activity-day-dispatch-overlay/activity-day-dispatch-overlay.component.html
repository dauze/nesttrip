<div
  class="dispatch-overlay fixed left-0 right-0 top-0 bottom-0"
  [class.dispatch-overlay--active]="dispatchService.isVisible()"
  [class.dispatch-overlay--expanded]="sheetExpanded()"
  [class.dispatch-overlay--bar-visible]="dispatchService.activeDayDrag() !== null">

  <div #sheet class="dispatch-overlay__sheet surface-0"
    [style.--dispatch-collapsed-h.px]="collapsedHeight()"
    [style.--dispatch-expand-duration.ms]="expandDurationMs()">

    <!-- Réplique de app-trip-tabs-nav : un vrai clone DOM du <p-tabs> réel
         (voir cloneNavBarInto), pas une re-création Angular parallèle — garantit
         un rendu identique au pixel près, y compris le décalage de scroll
         horizontal courant, quel que soit le jour actif. -->
    <div #replicaNav class="dispatch-overlay__replica"></div>

    <div #grid class="dispatch-overlay__scroll" (scroll)="onGridScroll()">
      @for (group of monthGroups(); track group.label) {
        <div class="dispatch-overlay__month">
          <div class="dispatch-overlay__month-label surface-0 font-semibold text-sm">{{ group.label }}</div>
          <div class="flex flex-wrap gap-2 mb-2">
            @for (day of group.days; track day.id.getTime(); let di = $index) {
             <p-button
                #dayCell
                [rounded]="true"
                [text]="hoveredDayKey() !== dayKeyFor(day)" 
                [severity]="hoveredDayKey() === dayKeyFor(day) ? undefined : 'secondary'"
                [attr.data-day-key]="dayKeyFor(day)"
                [style.transitionDelay.ms]="sheetExpanded() ? di * 25 : 0"
                class="dispatch-overlay__day"
                [class.dispatch-overlay__day--in]="sheetExpanded()"
                [class.dispatch-overlay__day--flip]="flippedDayIds().has(dayKeyFor(day))">
                <span class="flex flex-column align-items-center gap-0">
                  <span class="text-lg font-bold line-height-1">{{ day.id | date: 'd' }}</span>
                  <span class="text-xs uppercase line-height-1">{{ day.id | date: 'EEE' }}</span>
                </span>
                @if ((countsByDay().get(dayKeyFor(day)) ?? 0) > 0) {
                  <span class="dispatch-overlay__day-count">{{ countsByDay().get(dayKeyFor(day)) }}</span>
                }
              </p-button>
            }
          </div>
        </div>
      }
    </div>
  </div>
</div>

<div
  #ball
  class="dispatch-ball surface-0"
  [class.dispatch-ball--active]="dispatchService.isVisible()"
  [class.dispatch-ball--formed]="formed()"
  [style.transform]="formed() ? ballTransform() : null"
  [style.borderLeftColor]="dragged()?.color ?? null">
  <!-- Contenu rempli impérativement par un clone DOM de <app-activity-header>
       (voir playFormAnimation/cloneOriginHeaderInto) plutôt que reconstruit à
       la main ici : la bulle reprend telle quelle l'apparence réelle de
       l'en-tête d'activité (photo, titre, style), sans duplication à tenir
       à jour si l'en-tête change. -->
  <div class="dispatch-ball__row flex align-items-center h-full">
    <div #ballContent class="dispatch-ball__content"></div>
  </div>
</div>
