@for (option of options(); track option.value) {
  <button
    type="button"
    class="app-select-button__item"
    [class.app-select-button__item--active]="option.value === value()"
    (click)="select(option)">
    @if (option.icon) {
      <i [class]="option.icon"></i>
    }
    <span>{{ option.label }}</span>
  </button>
}
