<div class="day-hero">
    <div class="day-hero-title">
      <span contenteditable="true"
        (blur)="patch('title', $any($event.target).innerText.trim(), $event.target)">
        {{ day().title }}
      </span>
      @for (badge of day().badges; track badge.text) {
        <span class="badge {{ badge.class }}">{{ badge.text }}</span>
      }
    </div>
    <div class="day-hero-sub"
        contenteditable="true"
        (blur)="patch('subtitle', $any($event.target).innerText.trim(), $event.target)">
      {{ day().subtitle }}
    </div>
  </div>
