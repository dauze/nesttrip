<div class="flex flex-column gap-3" cdkDropList class="flex flex-column gap-2" (cdkDropListDropped)="onDrop($event)">
  @for (item of localItems(); track item.id) {
    <p-panel [toggleable]="true" cdkDrag>
      <ng-template pTemplate="header">
        <div class="flex align-items-center gap-2">
          <span cdkDragHandle><i class="pi pi-bars"></i></span>
          <textarea 
            pTextarea
            [autoResize]="true"
            [rows]="1" 
            [value]="item.title" 
            (blur)="updateTitle(item, $any($event.target).value.trim())" 
            [attr.data-title-id]="item.id"
            (keydown.arrowdown)="focusRow(item.id, 0, 0)"
          ></textarea>
          <p-button 
            [icon]="item.type === InfoType.TODO ? 'pi pi-list' : 'pi pi-check-square'"
            [rounded]="true"
            severity="secondary"
            [outlined]="true"
            (onClick)="toggleType(item)"
          />
        </div>
      </ng-template>        
        @for (point of item.elements; track point.id) {
          <div class="flex align-items-center gap-2 w-full">
            @if (item.type === InfoType.TODO) {
               <p-checkbox 
                [binary]="true"
                [ngModel]="point.checked"
                (ngModelChange)="toggleCheck(item, $index)"
              />
            }
            <textarea
              pTextarea
              [autoResize]="true"
              [rows]="1"
              [value]="point.text" 
              class="w-full"
              [class.line-through]="item.type === InfoType.TODO && point.checked"
              [class.text-color-secondary]="item.type === InfoType.TODO && point.checked"
              (input)="onTextChange(item, $index, $any($event.target).value)"
              (keydown.enter)="onEnterRow(item, $index, $any($event))" 
              (keydown.backspace)="onBackspaceRow(item, $index, $any($event))"
              (keydown.delete)="onDeleteRow(item, $index, $any($event))"
              (keydown.arrowup)="onArrowUp(item, $index, $any($event))"
              (keydown.arrowdown)="onArrowDown(item, $index, $any($event))"
              [attr.data-item-id]="item.id"
              [attr.data-index]="$index"
            ></textarea>
          </div>
        }
    </p-panel>
  }
  <div class="flex justify-content-center w-full">
    <p-button icon="pi pi-plus" [rounded]="true" severity="secondary" [outlined]="true" (onClick)="addItem()" />
  </div>
</div>
