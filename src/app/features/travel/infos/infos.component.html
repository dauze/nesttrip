<div class="flex flex-column gap-3">
  @for (item of info().items; track item.id) {
    <p-panel [toggleable]="true">
      
      <ng-template pTemplate="header">
        <textarea 
          pTextarea
          [autoResize]="true"
          [rows]="1"
          [value]="item.title" 
          (blur)="updateTitle(item, $any($event.target).value.trim())" 
          class="w-full font-bold"
          [attr.data-title-id]="item.id"
          (keydown.arrowdown)="focusRow(item.id, 0, 0)"
        ></textarea>
      </ng-template>

      <div class="flex flex-column gap-2 p-3 surface-card border-1 border-300 border-round">
        
        @for (point of getItems(item); track $index) {
          <div class="flex align-items-baseline gap-2 w-full"> @if (item.type === InfoType.TODO) {
              <p-checkbox [binary]="true" [ngModel]="point.checked" (onChange)="toggleCheck(item, $index)" class="mt-1" />
            } @else {
              <i class="pi pi-circle-fill text-xs text-color-secondary mt-2"></i>
            }

            <textarea
              pTextarea
              [autoResize]="true"
              [rows]="1"
              [value]="point.text" 
              class="w-full bg-transparent border-none p-1 shadow-none focus:outline-none resize-none overflow-hidden text-base line-height-3"
              [class.line-through]="item.type === InfoType.TODO && point.checked"
              [class.text-color-secondary]="item.type === InfoType.TODO && point.checked"
              (input)="onTextChange(item, $index, $any($event.target).value)"
              (keydown.enter)="onEnterRow(item, $index, $any($event))" 
              (keydown.backspace)="onBackspaceRow(item, $index, $any($event))"
              (keydown.arrowup)="onArrowUp(item, $index, $any($event))"
              (keydown.arrowdown)="onArrowDown(item, $index, $any($event))"
              [attr.data-item-id]="item.id"
              [attr.data-index]="$index"
            ></textarea>
          </div>
        }

      </div>
    </p-panel>
  }
</div>
