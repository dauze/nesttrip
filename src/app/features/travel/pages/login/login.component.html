<div class="auth-shell">
    <div class="auth-card">
    <div class="auth-header">
        <div class="logo-mark">⬡</div>
        <h1>{{ isRegister() ? 'Créer un compte' : 'Connexion' }}</h1>
        <p class="subtitle">{{ isRegister() ? 'Rejoignez-nous dès aujourd\'hui' : 'Bienvenue' }}</p>
    </div>

    <div class="auth-body">
        <!-- Google -->
        <button class="btn-google" (click)="loginGoogle()" [disabled]="loading()">
        <svg width="18" height="18" viewBox="0 0 18 18">
            <path fill="#4285F4" d="M16.51 8H8.98v3h4.3c-.18 1-.74 1.48-1.6 2.04v2.01h2.6a7.8 7.8 0 0 0 2.38-5.88c0-.57-.05-.66-.15-1.18z"/>
            <path fill="#34A853" d="M8.98 17c2.16 0 3.97-.72 5.3-1.94l-2.6-2.04a4.8 4.8 0 0 1-7.18-2.54H1.83v2.07A8 8 0 0 0 8.98 17z"/>
            <path fill="#FBBC05" d="M4.5 10.48A4.8 4.8 0 0 1 4.5 7.5V5.43H1.83a8 8 0 0 0 0 7.14z"/>
            <path fill="#EA4335" d="M8.98 3.58c1.32 0 2.5.45 3.44 1.35l2.54-2.54A8 8 0 0 0 1.83 5.43L4.5 7.5a4.8 4.8 0 0 1 4.48-3.92z"/>
        </svg>
        Continuer avec Google
        </button>

        <div class="divider"><span>ou</span></div>

        <!-- Email/password -->
        <div class="field">
        <label>Email</label>
        <input
            type="email"
            [(ngModel)]="email"
            placeholder="vous@exemple.com"
            [class.error]="!!errorMsg()"
            autocomplete="email"
        />
        </div>

        <div class="field">
        <label>Mot de passe</label>
        <input
            type="password"
            [(ngModel)]="password"
            placeholder="••••••••"
            [class.error]="!!errorMsg()"
            autocomplete="current-password"
        />
        </div>

        @if (errorMsg()) {
        <div class="error-banner">{{ errorMsg() }}</div>
        }

        <button class="btn-primary" (click)="submitEmail()" [disabled]="loading()">
        @if (loading()) { <span class="spinner"></span> }
        {{ isRegister() ? 'Créer mon compte' : 'Se connecter' }}
        </button>

        <p class="toggle-mode">
        {{ isRegister() ? 'Déjà un compte ?' : 'Pas encore de compte ?' }}
        <button class="link" (click)="toggleMode()" >
            {{ isRegister() ?  'Se connecter' : 'S\'inscrire' }}
        </button>
        </p>
    </div>
    </div>
</div>
