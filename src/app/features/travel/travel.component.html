@if (trip()) {
  <p-confirmDialog />
  <div class="flex flex-column gap-2" style="min-width: 29rem;">
    <p-toolbar>
      <ng-template #center>
          <span>{{ trip()!.title }}</span>
      </ng-template>
      <ng-template #end>
          <div class="card flex justify-center">
              <p-menu #menu [model]="items" [popup]="true" appendTo="body"  />
              <p-button (click)="menu.toggle($event)" icon="pi pi-user" rounded="true" />
          </div>
      </ng-template>
    </p-toolbar>
    <p-card>
      <p-tabs scrollable (activeValueChange)="onTabChange()"  [(value)]="activeDay" >
        <p-tablist>
          @for (tab of tabs(); track tab.id) {
            <p-tab [value]="tab.id">{{ tab.label }}</p-tab>
          }
        </p-tablist>

        <div cdkSwipe (swipeLeft)="nextTab()" (swipeRight)="prevTab()">
          <p-tabpanels>
            <p-tabpanel value="info" [lazy]="true">
              <app-infos [info]="trip()!.info" [tripId]="trip()!.id" />
            </p-tabpanel>
            @for (day of trip()?.days; track day.id) {
              <p-tabpanel [value]="day.id.toISOString()" [lazy]="true">
                <app-day-panel [dayId]="day.id" [tripId]="trip()!.id" />
              </p-tabpanel>
            }
          </p-tabpanels>
        </div>
      </p-tabs>
    </p-card>
  </div>
}
