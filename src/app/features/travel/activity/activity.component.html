<div class="activity">
  <button class="btn-primary rounded-btn" (click)="removeActivite()">
    <span>✕</span>
  </button>
  <div class="act-header">
    <div class="act-name-input" contenteditable="true"
    (blur)="patch({ name: $any($event.target).innerText.trim() })" >{{ activity().name }}
    </div>
    <div class="act-badges">
      <div class="act-files pill">
        <input #fileInput type="file" style="display:none" (change)="onFileSelected($event)" />
        @if (activity().fileUrl) {
          <div class="act-file-pill">
            <i class="ti ti-paperclip"></i>
            <a [href]="activity().fileUrl" target="_blank" rel="noopener">
              {{ activity().fileName }}
            </a>
            <button class="act-file-remove" (click)="removeFile()">
              <i class="ti ti-x"></i>
            </button>
          </div>
        }
        @if (!activity().fileUrl) {
          <button class="pill badge-file act-file-add" [disabled]="uploading()" (click)="fileInput.click()">
            @if (uploading()) { <span>🌀</span> } @else { <span>+</span> }
            Ajouter un fichier
          </button>
        }
      </div>
      @for (badge of activity().badges; track badge.text) {
        <span class="pill {{ badge.class }}">{{ badge.text }}</span>
      }
    </div>
  </div>

  <!-- Grid items -->
  @for (item of gridItems(); track $index; let i = $index) {
    <div class="act-item act-item--edit">
      <input
        class="act-grid-label"
        [value]="item.label"
        placeholder="Label"
        (blur)="updateGridItem(i, 'label', $any($event.target).value)"
        (keydown.enter)="onEnter($any($event), i)"
        (keydown.backspace)="onBackspace($any($event), i, 'label')"
      />
      <span class="act-item-sep">:</span>
      <input
        class="act-grid-value"
        [value]="item.value"
        placeholder="Valeur"
        (blur)="updateGridItem(i, 'value', $any($event.target).value)"
        (keydown.enter)="onEnter($any($event), i)"
        (keydown.backspace)="onBackspace($any($event), i, 'value')"
      />
    </div>
  }

  <!-- Transport -->
  <div class="act-transport act-transport--edit">
    <input
      class="act-transport-icon-input"
      [value]="activity().transport?.icon ?? ''"
      placeholder="🚇"
      (blur)="patchTransport('icon', $any($event.target).value)"
    />
    <input
      class="act-transport-text-input"
      [value]="activity().transport?.text ?? ''"
      placeholder="Description du transport..."
      (blur)="patchTransport('text', $any($event.target).value)"
    />
  </div>

  <!-- Tip -->
  <textarea
    class="act-tip-edit"
    [value]="activity().tip ?? ''"
    placeholder="Astuce / conseil..."
    (blur)="patch({ tip: $any($event.target).value || undefined })"
  ></textarea>

  <!-- Notes -->
  <div style="margin-top: 6px; position: relative;">
    <div class="act-notes-placeholder" [style.opacity]="notesValue() ? 0 : 1">
      Ajouter une note...
    </div>
    <textarea
      class="act-notes"
      [value]="notesValue()"
      (input)="notesValue.set($any($event.target).value)"
      (blur)="onNotesBlur()"
    ></textarea>
  </div>
</div>
