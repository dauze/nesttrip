<div class="flex align-items-center gap-2 w-full min-w-0">
  <span class="cursor-move text-color-secondary flex-shrink-0 drag-handle">
    <i class="pi pi-bars"></i>
  </span>

  <div class="flex-shrink-0 border-round overflow-hidden surface-100 flex align-items-center justify-content-center"
      style="width:3rem;height:3rem">
        @if (firstPhotoRef(); as ref) {
          <img *ngIf="getPhotoUrl$(ref, 120) | async as url" [src]="url" [alt]="activity().title"
              style="width:100%;height:100%;object-fit:cover" />
        } @else {
          <i [class]="'pi text-xl text-color-secondary ' + activityTypeMeta[activity().type]?.icon"></i>
        }
  </div>

  <div class="flex flex-column flex-1 min-w-0 gap-1" (click)="$event.stopPropagation()">
    <p-autoComplete
      [suggestions]="places()"
      [(ngModel)]="title"
      (onBlur)="onTitleBlur()"
      (completeMethod)="onSearch($event)"
      (onSelect)="onSelect($event)"
      field="name"
      [dropdown]="false"
      [autoHighlight]="true"
      placeholder="Nom de l'activité"
      class="w-full transparent-inputtext"
      appendTo="body"
      panelStyleClass="autocomplete-panel-fix"
      [emptyMessage]="searching() ? 'Chargement...' : 'Aucun résultat trouvé'"
      [inputStyleClass]="'w-full font-semibold p-0 text-base'">
      <ng-template #item let-place>
        <div class="flex align-items-start gap-2 w-full min-w-0">
          <div class="border-round overflow-hidden surface-100 flex align-items-center justify-content-center flex-shrink-0"
              style="width:2.5rem;height:2.5rem">
            @if (place.photoRef?.name; as ref) {
              <img *ngIf="getPhotoUrl$(ref, 120) | async as url" [src]="url" [alt]="place.name"
                  style="width:100%;height:100%;object-fit:cover" />
            } @else {
              <i class="pi pi-map-marker text-color-secondary text-sm"></i>
            }
          </div>
          <div class="flex flex-column min-w-0 flex-1">
            <span class="font-medium text-sm white-space-normal line-height-3">{{ place.name }}</span>
            <span class="text-color-secondary text-xs white-space-normal line-height-2">{{ place.address }}</span>
          </div>
        </div>
      </ng-template>
    </p-autoComplete>

    <div class="flex align-items-center gap-2 flex-wrap">
      <span class="text-color-secondary text-xs flex align-items-center gap-1">
        <i class="pi pi-clock" style="font-size:0.65rem"></i>
        {{ activity().duration | duration }}
      </span>
      @if (activity().price.amount) {
        <span class="text-color-secondary text-xs flex align-items-center gap-1">
          <i class="pi pi-euro" style="font-size:0.65rem"></i>
          {{ activity().price.amount }} {{ activity().price.currency }}
        </span>
      }
    </div>
  </div>
</div>
