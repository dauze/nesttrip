<div class="flex flex-column gap-2">
  @if (activities().length > 0) {
    <app-timeline [activities]="activities()" (activitySelected)="focusActivity($event)"/>
    <div #stickyMap class="sticky-map">
      @if (!activeMapComponent()) {
        <p-panel [toggleable]="true" [collapsed]="collapsed()">
          <ng-template #header>
            <div class="flex align-items-center gap-2">
              <i class="pi pi-calendar"></i>
              <span>Carte</span>
            </div>
          </ng-template>
          <p-skeleton height="250px" width="100%" borderRadius="3px" />
        </p-panel>
      }
    </div>
  }
  <p-panel [toggleable]="true"  [(collapsed)]="activitiesCollapsed"
  (onAfterToggle)="onActivitiesPanelToggled()">
    <ng-template  #header>
      <div class="flex align-items-center gap-2">
        <i class="pi pi-calendar"></i>
        <span>Activités</span>
      </div>
    </ng-template>
    <div class="flex flex-column gap-2">
      <div cdkDropList class="flex flex-column gap-2" (cdkDropListDropped)="onDrop($event)">
        @for (activity of activities(); track activity.id) {
            <app-activity-card cdkDrag (cdkDragStarted)="onDragStarted()" [scrollOffset]="stickyOffset()"
      (cdkDragEnded)="onDragEnded()" [activityId]="activity.id" [dayId]="dayId()" [tripId]="tripId()" />
        }
      </div>
      @if (activities().length === 0) {
          <p-message
            severity="info"
            icon="pi pi-info-circle"
            text="Aucune activitée pour l'instant, n'hésitez pas à en créer avec le bouton +."
            class="w-full flex justify-content-center"
          />
        }
      <div class="flex justify-content-center w-full">
        <p-button icon="pi pi-plus" [rounded]="true" severity="secondary" [outlined]="true" (onClick)="addActivity()" />
      </div>
    </div>
  </p-panel>
</div>
