<div class="flex flex-column">
  <div class="w-full sub-tab-switch">
    <app-select-button
      [options]="subTabOptions"
      [value]="activeSubTab()"
      (valueChange)="selectSubTab($event)"
    />
  </div>
  <div>
    @if (activeSubTab() === 'notes') {
      <app-notes [notes]="notes()" [tripId]="tripId()" />
    } @else {
      <app-trip-activities [tripId]="tripId()" />
    }
  </div>

</div>
