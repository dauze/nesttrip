<div class="map-anchor">
  <app-trip-day-map #dayMap></app-trip-day-map>
</div>
<swiper-container
  #swiperRef
  init="false"
  class="tab-content-wrapper"
  [style.--chrome-top-offset.px]="chromeService.chromeHeight()"
  [style.--chrome-tabs-nav-height.px]="chromeService.tabsNavHeight()">
  <swiper-slide>
    @if (visitedDays().has('notes')) {
      <app-general-panel [notes]="trip().notes" [tripId]="trip().id" />
    }
  </swiper-slide>
  @for (day of sortedDays(); track day.id) {
    <swiper-slide>
      @if (visitedDays().has(day.id.toISOString())) {
        <app-day-panel
          [dayId]="day.id"
          [tripId]="trip().id"
          [active]="activeId() === day.id.toISOString()"
        />
      }
    </swiper-slide>
  }
</swiper-container>
