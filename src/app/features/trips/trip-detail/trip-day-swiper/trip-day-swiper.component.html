<div class="map-anchor">
  <app-trip-day-map #dayMap></app-trip-day-map>
</div>
<swiper-container #swiperRef init="false" class="tab-content-wrapper">
  <swiper-slide>
    @if (visitedDays().has('notes')) {
      <app-general-panel appSwiperAutoHeightWatch  [notes]="trip().notes" [tripId]="trip().id" />
    }
  </swiper-slide>
  @for (day of sortedDays(); track day.id) {
    <swiper-slide>
      @if (visitedDays().has(day.id.toISOString())) {
        <app-day-panel 
          appSwiperAutoHeightWatch 
          [dayId]="day.id" 
          [tripId]="trip().id" 
          [active]="activeId() === day.id.toISOString()"
        />
      }
    </swiper-slide>
  }
</swiper-container>
