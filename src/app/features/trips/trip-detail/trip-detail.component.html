<p-confirmDialog />
<div class="flex flex-column trip-detail-root">
  @if (facade.activeTrip(); as trip) {
    <div  class="flex flex-column" [class.invisible-content]="!contentReady()">
      <div
        #headerWrapper
        class="app-trip-header-fixed"
        [style.top.px]="chromeService.toolbarHeight()"
        [style.transform]="'translateY(' + chromeService.translateY() + 'px)'">
        <app-trip-header
          [trip]="trip"
          [title]="tripTitle()"
          (titleChange)="onTitleChange($event)"
          (datesChange)="onDatesChange($event)">
          <app-trip-collaborators
            trip-actions
            [tripId]="trip.id" />
        </app-trip-header>
      </div>

      <app-trip-tabs-nav
        class="fixed bottom-0 left-0 right-0 z-5"
        [tabs]="tabs()"
        [activeId]="activeDay()"
        (tabSelected)="onTabSelected($event)" />

      <app-trip-day-swiper
        [trip]="trip"
        [tabs]="tabs()"
        [activeId]="activeDay()"
        (activeIdChange)="onSwiperActiveIdChange($event)"
        (ready)="onSwiperReady()" />
    </div>
  }

  @if (facade.activeTripLoading() || !contentReady()) {
    <app-trip-detail-skeleton class="skeleton-overlay"/>
  }

  <app-activity-day-dispatch-overlay [days]="sortedDays()" [tabs]="tabs()" [activeDayId]="activeDay()" />

  <!-- Voir ActivityDispatchService.registerDragPortal : point d'ancrage hors du
       swiper de jours (dont un ancêtre `swiper-slide` applique transform/filter,
       ce qui casserait le position:fixed) pour le CLONE qui suit le doigt
       pendant un réordonnancement intra-jour (DayPanelComponent.beginCardFollow). -->
  <div #dragPortal class="drag-portal-anchor"></div>
</div>
