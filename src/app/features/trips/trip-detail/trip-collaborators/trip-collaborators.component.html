<div class="flex align-items-center gap-3">
  <p-avatarGroup>
    @for (entry of visibleMembers(); track entry[0]) {
      <p-avatar
        [label]="getInitials(entry[1])"
        shape="circle"
        size="normal"
        [pTooltip]="entry[1].email"
        tooltipEvent="both"
        tooltipPosition="bottom" />
    }
    @if (extraCount() > 0) {
      <p-avatar
        [label]="'+' + extraCount()"
        shape="circle"
        size="normal"
        [pTooltip]="extraTooltip()"
        tooltipPosition="bottom" />
    }
  </p-avatarGroup>

  <p-button
    icon="pi pi-user-plus"
    [rounded]="true"
    [text]="true"
    severity="secondary"
    (onClick)="openInviteDialog()" />
</div>

<p-dialog
  header="Inviter un collaborateur"
  [(visible)]="showInviteDialog"
  [modal]="true"
  [draggable]="false">
  <div class="flex flex-column gap-3 pt-2">
    <div class="flex flex-column gap-2">
      <label for="inviteeEmail">Adresse email</label>
      <input
        pInputText
        id="inviteeEmail"
        name="inviteeEmail"
        [(ngModel)]="inviteeEmail"
        placeholder="collaborateur@email.com"
        [disabled]="inviteLoading()"
        class="w-full" />
    </div>
    <div class="flex flex-column gap-2">
      <label for="inviteeRole">Rôle</label>
      <p-select
        id="inviteeRole"
        name="inviteeRole"
        [(ngModel)]="inviteeRole"
        [options]="roleOptions"
        optionLabel="label"
        optionValue="value"
        appendTo="body"
        class="transparent-select"
        [disabled]="inviteLoading()" />
    </div>
    @if (inviteError()) {
      <p-message severity="error" [text]="inviteError()!" />
    }
  </div>
  <ng-template #footer>
    <p-button
      label="Annuler"
      severity="secondary"
      [outlined]="true"
      (onClick)="closeInviteDialog()" />
    <p-button
      label="Inviter"
      [loading]="inviteLoading()"
      [disabled]="!inviteeEmail"
      (onClick)="inviteCollaborator()" />
  </ng-template>
</p-dialog>
