<div class="flex align-items-center gap-3 cursor-pointer" (click)="openDialog()" role="button" tabindex="0">
  <p-avatarGroup>
    @for (entry of visibleMembers(); track entry[0]) {
      <p-avatar
        [label]="getInitials(entry[1].displayName, entry[1].email)"
        shape="circle"
        size="normal"
        [pTooltip]="entry[1].displayName || entry[1].email"
        tooltipEvent="both"
        tooltipPosition="bottom" />
    }
    @if (extraCount() > 0) {
      <p-avatar
        [label]="'+' + extraCount()"
        shape="circle"
        size="normal"
        [pTooltip]="extraTooltip()"
        tooltipPosition="bottom" />
    }
  </p-avatarGroup>
</div>

<app-collaborators-dialog
  [(visible)]="showDialog"
  [members]="members()"
  [currentUserId]="currentUserId()"
  [isOwner]="isOwner()"
  [companions]="userProfileService.companions()"
  [addLoading]="addLoading()"
  [addError]="addError()"
  (add)="onAdd($event)"
  (remove)="onRemove($event)"
  (removeCompanion)="onRemoveCompanion($event)" />
