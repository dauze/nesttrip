<div class="flex flex-column gap-3 p-4">

  <!-- Header -->
  <div class="flex justify-content-between align-items-center">
    <span class="text-2xl font-semibold">Mes voyages</span>
  </div>

  <!-- Skeleton -->
  @if (tripsLoading()) {
    <div class="grid">
      @for (i of [1, 2, 3]; track i) {
        <div class="col-12 md:col-6 lg:col-4">
          <p-card>
            <p-skeleton height="1.5rem" styleClass="mb-2" />
            <p-skeleton height="1rem" width="60%" />
          </p-card>
        </div>
      }
    </div>
{{trips()}}
  <!-- Empty state -->
  } @else if (trips().length === 0) {
    <p-message
      severity="info"
      text="Aucun voyage pour l'instant."
      styleClass="w-full"
    />

  <!-- Trip list -->
  } @else {
    <div class="grid">
      @for (trip of trips(); track trip.id) {
        <div class="col-12 md:col-6 lg:col-4">
          <p-card
            styleClass="cursor-pointer hover:surface-100 transition-colors transition-duration-200 w-full"
            (click)="selectTrip(trip.id)"
          >
            <div class="flex justify-content-between align-items-center">
              <span class="font-medium text-lg">{{ trip.title }}</span>
              <i class="pi pi-arrow-right text-color-secondary"></i>
            </div>
          </p-card>
        </div>
      }
    </div>
  }
    <p-button [rounded]="true"
    label="Ajouter un voyage"
    icon="pi pi-plus"
    styleClass="w-full"
    routerLink="/trips/new"
  />

</div>
