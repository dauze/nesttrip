<app-card>

    <!-- Header -->
    <div cardTitle class="flex justify-content-between align-items-center w-full">
      <span class="text-2xl font-semibold">Mes voyages</span>
      @if (trips().length > 0){
        <app-button
          [label]="editMode ? 'Annuler' : 'Modifier'"
          [icon]="editMode ? 'pi pi-times' : 'pi pi-pencil'"
          [severity]="editMode ? 'secondary' : 'primary'"
          size="small"
          (click)="toggleEditMode()"
        />}
    </div>

    <!-- Content -->
    <div class="mt-3">

      <!-- Loading -->
      @if (tripsLoading()) {
        <div class="grid">
          @for (i of [1, 2, 3]; track i) {
            <div class="col-12 md:col-6 lg:col-4">
              <app-card class="h-full">
                <app-skeleton height="1.5rem" class="mb-2"></app-skeleton>
                <app-skeleton height="1rem" width="60%"></app-skeleton>
              </app-card>
            </div>
          }
        </div>

      <!-- Empty -->
      } @else if (trips().length === 0) {
        <div class="flex justify-content-center align-items-center">
          <app-message
            severity="info"
            text="Aucun voyage pour l'instant. Créer ton premier voyage !"
            class="w-full md:w-6"
          />
        </div>

      <!-- List -->
     <!-- List -->
} @else {
  <div class="grid">
    @for (trip of trips(); track trip.id) {
      <div class="col-12 md:col-6 lg:col-4">
        <app-card
          [ngClass]="{
            'cursor-pointer hover:surface-100': !editMode || user?.uid === trip.ownerId,
            'cursor-default opacity-80': editMode && user?.uid !== trip.ownerId
          }"
          class="w-full h-full transition-colors transition-duration-200"
          (click)="editMode ? (user?.uid === trip.ownerId && toggleTripSelection(trip.id)) : selectTrip(trip.id)"
          pTooltip="Seul le propriétaire de ce voyage peut le supprimer."
          tooltipEvent="both"
          [tooltipDisabled]="!editMode || user?.uid === trip.ownerId"
        >
          <div class="flex justify-content-between align-items-center">

            <!-- Checkbox (only in edit mode) -->
            @if (editMode && user?.uid === trip.ownerId) {
              <app-checkbox
                [(checked)]="selectedTripsMap[trip.id]"
                (click)="$event.stopPropagation()"
              ></app-checkbox>
            }

            <!-- Title with conditional disabled color -->
            <span 
              class="font-medium text-lg flex-grow-1 ml-2"
              [ngClass]="{ 'text-color-secondary opacity-60': editMode && user?.uid !== trip.ownerId }"
            >
              {{ trip.title }}
            </span>

            @if (!editMode) {
              <i class="pi pi-arrow-right text-color-secondary"></i>
            }
          </div>
        </app-card>
      </div>
    }
  </div>
}

    </div>

    <!-- Footer buttons -->
    <div cardFooter class="flex justify-content-end gap-2">
      <!-- Supprimer -->
      @if (editMode) {
        <app-button
          label="Supprimer"
          icon="pi pi-trash"
          severity="danger"
          size="small"
          [disabled]="!hasSelection()"
          (click)="confirmDelete()"
        />
      }
      <!-- Ajouter -->
      <app-button
        label="Créer un voyage"
        icon="pi pi-plus"
        size="small"
        routerLink="/trips/new"
      />
    </div>

  </app-card>

  <!-- Confirm dialog -->
  <p-confirmDialog />
