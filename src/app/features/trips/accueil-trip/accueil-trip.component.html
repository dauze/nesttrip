<div class="pt-2">

  <p-card>

    <!-- Header -->
    <ng-template pTemplate="title">
      <div class="flex justify-content-between align-items-center w-full">
        <span class="text-2xl font-semibold">Mes voyages</span>       
      <p-button
        [label]="editMode ? 'Terminer' : 'Modifier'"
        [icon]="editMode ? 'pi pi-check' : 'pi pi-pencil'"
        size="small"
        (click)="toggleEditMode()"
      />
      </div>
    </ng-template>

    <!-- Content -->
    <div class="mt-3">

      <!-- Loading -->
      @if (tripsLoading()) {
        <div class="grid">
          @for (i of [1, 2, 3]; track i) {
            <div class="col-12 md:col-6 lg:col-4">
              <p-card class="h-full">
                <p-skeleton height="1.5rem" styleClass="mb-2"></p-skeleton>
                <p-skeleton height="1rem" width="60%"></p-skeleton>
              </p-card>
            </div>
          }
        </div>

      <!-- Empty -->
      } @else if (trips().length === 0) {
        <div class="flex justify-content-center align-items-center">
          <p-message
            severity="info"
            text="Aucun voyage pour l'instant."
            styleClass="w-full md:w-6"
          />
        </div>

      <!-- List -->
      } @else {
        <div class="grid">
          @for (trip of trips(); track trip.id) {
            <div class="col-12 md:col-6 lg:col-4">
              <p-card
                styleClass="cursor-pointer w-full h-full hover:surface-100 transition-colors transition-duration-200"
                (click)="editMode ? toggleTripSelection(trip.id) : selectTrip(trip.id)"
              >
                <div class="flex justify-content-between align-items-center">

                  <!-- Checkbox (only in edit mode) -->
                  @if (editMode) {
                    <p-checkbox
                      [binary]="true"
                      [(ngModel)]="selectedTripsMap[trip.id]"
                      (click)="$event.stopPropagation()"
                    ></p-checkbox>
                  }

                  <span class="font-medium text-lg flex-grow-1 ml-2">
                    {{ trip.title }}
                  </span>

                  @if (!editMode) {
                    <i class="pi pi-arrow-right text-color-secondary"></i>
                  }
                </div>
              </p-card>
            </div>
          }
        </div>
      }

    </div>

    <!-- Footer buttons -->
    <ng-template pTemplate="footer">
      <div class="flex justify-content-end gap-2">
        <!-- Supprimer -->
        @if (editMode) {
          <p-button
            label="Supprimer"
            icon="pi pi-trash"
            severity="danger"
            size="small"
            [disabled]="!hasSelection()"
            (click)="confirmDelete()"
          />
        }
        <!-- Ajouter -->
        <p-button
          label="Ajouter"
          icon="pi pi-plus"
          size="small"
          routerLink="/trips/new"
        />

      </div>
    </ng-template>

  </p-card>

  <!-- Confirm dialog -->
  <p-confirmDialog />

</div>
