<div class="flex justify-content-center align-items-center min-h-screen bg-transparent p-3">
  <p-card class="w-full max-w-28rem p-2">
    <div class="text-center mb-5">
      <img src="nesttrip.ico" alt="Logo" class="h-4rem w-4rem mb-3 border-circle shadow-1" />
      <h1 class="text-2xl font-bold text-900 m-0 mb-2">
        {{ isRegister() ? 'Créer un compte' : 'Connexion' }}
      </h1>
      <p class="text-color-secondary m-0">
        {{ isRegister() ? "Rejoignez-nous dès aujourd'hui" : 'Bienvenue' }}
      </p>
    </div>

    <div class="flex flex-column gap-4">
      <p-button
        label="Continuer avec Google"
        icon="pi pi-google"
        severity="secondary"
        styleClass="w-full justify-content-center"
        [disabled]="loading()"
        (onClick)="loginGoogle()">
      </p-button>

      <p-divider>
        <span class="text-sm text-color-secondary font-normal">ou</span>
      </p-divider>

      <!-- Prénom + Nom uniquement à l'inscription -->
      @if (isRegister()) {
        <div class="flex flex-column gap-2 flex-1">
          <label for="firstName" class="font-medium text-900">Prénom</label>
          <input
            pInputText
            id="firstName"
            type="text"
            [(ngModel)]="firstName"
            placeholder="Jean"
            autocomplete="given-name"
            class="w-full" />
        </div>
        <div class="flex flex-column gap-2 flex-1">
          <label for="lastName" class="font-medium text-900">Nom</label>
          <input
            pInputText
            id="lastName"
            type="text"
            [(ngModel)]="lastName"
            placeholder="Dupont"
            autocomplete="family-name"
            class="w-full" />
        </div>
      }

      <div class="flex flex-column gap-2">
        <label for="email" class="font-medium text-900">Email</label>
        <input
          pInputText
          id="email"
          type="email"
          [(ngModel)]="email"
          placeholder="vous@exemple.com"
          autocomplete="email"
          [invalid]="!!errorMsg()"
          class="w-full" />
      </div>

      <div class="flex flex-column gap-2">
        <label for="password" class="font-medium text-900">Mot de passe</label>
        <p-password
          id="password"
          [(ngModel)]="password"
          [toggleMask]="true"
          [feedback]="false"
          placeholder="••••••••"
          autocomplete="current-password"
          styleClass="w-full"
          inputStyleClass="w-full"
          [invalid]="!!errorMsg()">
        </p-password>
      </div>

      @if (errorMsg()) {
        <p-message severity="error" [text]="errorMsg()" styleClass="w-full justify-content-start"></p-message>
      }

      <p-button
        [label]="isRegister() ? 'Créer mon compte' : 'Se connecter'"
        styleClass="w-full justify-content-center mt-2"
        [loading]="loading()"
        (onClick)="submitEmail()">
      </p-button>

      <p class="text-center text-color-secondary m-0 mt-2">
        {{ isRegister() ? 'Déjà un compte ?' : 'Pas encore de compte ?' }}
        <p-button
          [label]="isRegister() ? 'Se connecter' : 'S\'inscrire'"
          link="true"
          styleClass="p-0 vertical-align-baseline ml-1 font-semibold"
          (onClick)="toggleMode()">
        </p-button>
      </p>
    </div>
  </p-card>
</div>
